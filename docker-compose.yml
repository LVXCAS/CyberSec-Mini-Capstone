networks:
  red-net:
    internal: true
  blue-net:
    internal: true
  orchestrator-net:
    driver: bridge

services:
  battleground:
    build:
      context: ./battleground
    container_name: battleground
    networks:
      - orchestrator-net
    expose:
      - "22"
      - "80"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo | curl -s telnet://localhost:22 | grep -q SSH || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  orchestrator:
    build:
      context: ./orchestrator
    container_name: orchestrator
    networks:
      - red-net
      - blue-net
      - orchestrator-net
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      battleground:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  red-agent:
    build:
      context: ./agents/red_agent
    container_name: red-agent
    networks:
      - red-net
    depends_on:
      orchestrator:
        condition: service_started

  blue-agent:
    build:
      context: ./agents/blue_agent
    container_name: blue-agent
    networks:
      - blue-net
    depends_on:
      orchestrator:
        condition: service_started
